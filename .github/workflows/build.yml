name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: macos-13
            platform: mac
          - os: windows-2022
            platform: win

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Run tests
        working-directory: electron
        run: npm test

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        working-directory: electron
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: matrix.platform == 'mac'
        working-directory: electron
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build — users can right-click → Open to bypass Gatekeeper
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build (Windows)
        if: matrix.platform == 'win'
        working-directory: electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: dist/*.dmg

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stream Deck ${{ github.ref_name }}
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Linux (portable) | `stream-deck-*.AppImage` |
            | Linux (Debian/Ubuntu) | `stream-deck-*.deb` |
            | macOS | `stream-deck-*.dmg` |
            | Windows | `stream-deck-*.exe` |

            ### Quick start
            1. Download for your platform
            2. Run it — a QR code appears
            3. Scan the QR code on your phone
            4. Start adding buttons

            See the [full documentation](https://github.com/chunkies/stream-deck/tree/master/docs) and [plugin SDK](https://github.com/chunkies/stream-deck/tree/master/docs).
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
