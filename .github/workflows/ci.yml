name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit + browser tests (with coverage)
        run: npm run test:coverage

      - name: Build app
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: PWA E2E tests (headless Chromium)
        run: npx playwright test --project=pwa

      - name: Install Xvfb for Electron tests
        run: sudo apt-get install -y xvfb

      - name: Renderer E2E tests (Electron + Xvfb)
        run: xvfb-run --auto-servernum npx playwright test --project=renderer

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
