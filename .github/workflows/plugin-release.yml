name: Plugin Release

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'plugins/**'
      - 'registry/**'

permissions:
  contents: write

jobs:
  build-plugins:
    runs-on: ubuntu-latest
    name: Build & publish plugins

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the commit step can push back to master.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin zips & regenerate registry
        run: npm run build:plugins

      - name: Validate registry
        run: npm run validate:registry

      - name: Commit updated registry and zips (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/registry.json releases/*.zip
          git diff --cached --quiet || git commit -m "chore: rebuild plugin releases"
          git push
