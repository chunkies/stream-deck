<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss:; font-src 'self'">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MacroPad</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <button class="back-btn hidden" id="back-btn">‹</button>
      <div class="ws-indicator">
        <span class="dot disconnected" id="ws-dot"></span>
        <span id="ws-status">Connecting...</span>
      </div>
      <div id="page-name" class="page-name">—</div>
    </div>

    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>

    <div class="bottom-bar">
      <div class="page-dots" id="page-dots"></div>
      <button class="settings-btn" id="settings-btn" aria-label="Settings">⚙</button>
    </div>
  </div>

  <!-- Settings sheet overlay -->
  <div class="settings-sheet" id="settings-sheet" aria-hidden="true">
    <div class="settings-sheet-inner">
      <div class="settings-sheet-header">
        <span class="settings-sheet-title">Settings</span>
        <button class="settings-sheet-close" id="settings-sheet-close" aria-label="Close">✕</button>
      </div>
      <div class="settings-row">
        <span class="settings-label">Theme</span>
        <div class="theme-swatches" id="theme-swatches">
          <button class="theme-swatch" data-theme-name="dark"     title="Dark"     style="background:#090d1a;border-color:#7c3aed"></button>
          <button class="theme-swatch" data-theme-name="oled"     title="OLED"     style="background:#000000;border-color:#6366f1"></button>
          <button class="theme-swatch" data-theme-name="neon"     title="Neon"     style="background:#000000;border-color:#ff00ff"></button>
          <button class="theme-swatch" data-theme-name="minimal"  title="Minimal"  style="background:#f8fafc;border-color:#334155"></button>
          <button class="theme-swatch" data-theme-name="terminal" title="Terminal" style="background:#0d0d00;border-color:#ffd700"></button>
          <button class="theme-swatch" data-theme-name="ocean"    title="Ocean"    style="background:#0a1628;border-color:#0ea5e9"></button>
          <button class="theme-swatch" data-theme-name="sakura"   title="Sakura"   style="background:#1a0a14;border-color:#f472b6"></button>
          <button class="theme-swatch" data-theme-name="forest"   title="Forest"   style="background:#0a1a0a;border-color:#22c55e"></button>
        </div>
      </div>
    </div>
  </div>
  <!-- Connecting / reconnect overlay (visible from page load until first successful connect) -->
  <div class="offline-overlay visible" id="offline-overlay">
    <div class="offline-content">
      <div class="offline-icon">📡</div>
      <div class="offline-title" id="offline-title">Connecting…</div>
      <div class="offline-sub">Make sure the MacroPad app is running on your PC</div>
    </div>
  </div>

  <script src="haptic.js"></script>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
