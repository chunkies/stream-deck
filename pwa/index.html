<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MacroPad</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div class="ws-indicator">
        <span class="dot disconnected" id="ws-dot"></span>
        <span id="ws-status">Connecting...</span>
      </div>
      <div id="page-name" class="page-name">—</div>
    </div>

    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>

    <div class="bottom-bar">
      <div class="page-dots" id="page-dots"></div>
    </div>
  </div>
  <!-- Offline / reconnect overlay -->
  <div class="offline-overlay" id="offline-overlay">
    <div class="offline-content">
      <div class="offline-icon">📡</div>
      <div class="offline-title">Reconnecting…</div>
      <div class="offline-sub">Make sure the MacroPad app is running on your PC</div>
    </div>
  </div>

  <script src="haptic.js"></script>
  <script src="app.js"></script>
</body>
</html>
